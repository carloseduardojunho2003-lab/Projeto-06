<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Trader Privado</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #172251, #09101f 55%);
      color: #eef3ff;
    }

    .card {
      width: min(480px, 90vw);
      background: rgba(17, 24, 52, 0.92);
      border: 1px solid #33448c;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0;
      color: #b8c5ee;
      line-height: 1.5;
    }

    .spinner {
      margin: 24px auto 18px;
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255, 255, 255, 0.12);
      border-top-color: #41d39b;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>IA Trader Privado</h1>
    <p>Conectando ao painel seguro e carregando a versao mais recente do servidor.</p>
    <div class="spinner"></div>
    <p>Se houver uma atualizacao online, ela sera aplicada automaticamente.</p>
  </main>
</body>
</html>
